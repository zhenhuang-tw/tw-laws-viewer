name: Sync Laws

on:
  schedule:
    # UTC+8 每週日中午 12:00 = UTC 每週日 04:00
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm sync

      - name: Commit and push if changes
        run: |
          if [ -n "$(git status --porcelain content/laws/)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add content/laws/
            git commit -m "chore(sync): update law data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
